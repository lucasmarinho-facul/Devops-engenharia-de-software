<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculadora App</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1>Calculadora App</h1>
        <div class="div">

            <div class="divs">
                <label for="numero1">Número 1</label>
                <input type="number" id="numero1">
            </div>

            <div class="divs">
                <label for="numero2">Número 2</label>
                <input type="number" id="numero2">
            </div>

            <div class="divs">
                <button onclick="calcularSoma()">+</button>
                <button onclick="calcularSubtraçao()">-</button>
                <button onclick="calcularMultiplicacao()">*</button>
                <button onclick="calcularDivisao()">/</button>
                <button onclick="limparResultado()">Limpar</button>
            </div>

            <div class="divs">
                Resultado: <span id="resultado"></span>
            </div>
        </div>
        <!-- Scripts -->
        <script src="app.js"></script>
    </body>
</html>
